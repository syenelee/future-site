backend:
  name: github
  repo: syenelee/future-site
  branch: main

media_folder: public/images
public_folder: /images

collections:
  - name: posts
    label: Posts
    folder: src/pages/posts
    create: true
    slug: "{{slug}}"
    fields:
      - label: Title
        name: title
        widget: string

      - label: Date
        name: date
        widget: datetime

      - label: Body
        name: body
        widget: markdown